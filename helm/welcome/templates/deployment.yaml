apiVersion: apps/v1
kind: Deployment

metadata:
  name: welcome

spec:
  replicas: {{ .Values.replicaCount }}

  selector:
    matchLabels:
      app: welcome

  template:
    metadata:
      labels:
        app: welcome

    spec:
      containers:
      - name: welcome

        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"

        imagePullPolicy: {{ .Values.image.pullPolicy }}

        ports:
        - containerPort: 80
