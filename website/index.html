<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome DevOps</title>

    <style>
        body{
            margin:0;
            font-family:Arial,sans-serif;
            background:linear-gradient(135deg,#0f172a,#2563eb);
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card{
            background:rgba(255,255,255,.12);
            padding:40px;
            border-radius:15px;
            text-align:center;
            width:600px;
        }

        h1{
            font-size:48px;
            margin-bottom:10px;
        }

        p{
            font-size:22px;
        }

        .box{
            margin-top:30px;
            padding:15px;
            background:white;
            color:black;
            border-radius:10px;
        }

        .version{
            margin-top:25px;
            font-weight:bold;
            color:yellow;
        }
    </style>
</head>

<body>

<div class="card">

<h1>🚀 Welcome to DevOps CI/CD Dem0</h1>

<p>This website is running on Kubernetes using:</p>

<div class="box">
Docker<br>
GitHub Actions<br>
Docker Hub<br>
Helm<br>
Argo CD<br>
Minikube<br>
NGINX
</div>

<p class="version">
Version 2.0 - Updated via GitHub Push 🎉
</p>

</div>

</body>
</html>
